<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bean to Brew - Contact</title>

  <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #3A2F2B;
      color: #3e2c23;
    }

    .contact-section {
      padding: 80px 20px;
    }

    .contact-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .contact-title h1 {
      font-size: 48px;
      font-family: 'Playfair Display', serif;
      color: #EDE8DC;
      margin-bottom: 10px;
    }

    .contact-title p {
      color: #C1B393;
      font-size: 16px;
    }

    .contact-container {
      max-width: 600px;
      margin: auto;
      background:#4B4F3E;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

   .contact-form label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: #EDE8DC;
}

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #EDE8DC;
      border-radius: 6px;
      font-size: 14px;
    }

    .contact-form textarea {
      height: 130px;
      resize: none;
    }

    .contact-form button {
      width: 100%;
      padding: 14px;
      background: #26231F;
      color:#EDE8DC;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .contact-form button:hover {
      background: #C1B393;
    }

    @media (max-width: 768px) {
      .contact-section {
        padding: 50px 16px;
      }

      .contact-title h1 {
        font-size: 38px;
      }

      .contact-container {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

<header>
  <nav class="navbar">

    <div class="logo">
      <img src="logo.png" alt="Bean to Brew Logo">
    </div>

    <ul class="nav-links">
      <li><a href="index.html"class="active">Home</a></li>
      <li><a href="BrewSchool.html">Brew School</a></li>
      <li><a href="CoffeLab.html">Coffee Lab</a></li>
      <li><a href="student-dashboard.html">Student Dashboard</a></li>
      <li><a href="About-us.html">About Us</a></li>
      <li><a href="Contact.html">Contact Us</a></li>
    </ul>

    <div class="nav-right">
      <button class="mode-btn">☀️</button>
      <input type="text" placeholder="Search" class="search-box">
    </div>

  </nav>
</header>

    </nav>
  </header>

  <main>
    <section class="contact-section">

      <div class="contact-title">
        <h1>Contact Us</h1>
        <p>Have a question? Send us a message.</p>
      </div>

      <div class="contact-container">
        <form class="contact-form">

          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" required>

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>

          <label for="message">Message</label>
          <textarea id="message" placeholder="Write your message..." required></textarea>

          <button type="submit">Submit</button>

        </form>
      </div>

    </section>
  </main>

  <footer class="site-footer">

    <div class="footer-top">

      <div class="footer-logo">
        <img src="logo.png" alt="Bean to Brew Logo">
      </div>

      <div class="footer-contact">
        <h3>Contact us</h3>
        <p>+966504256847</p>
        <p>BeantoBrew@gmail.com</p>
      </div>

      <div class="footer-social">
        <h3>Follow us</h3>

        <div class="social-icons">
          <a href="javascript:void(0);">
            <img src="instagramicon.png" alt="Instagram">
          </a>

          <span class="social-divider"></span>

          <a href="javascript:void(0);">
            <img src="Xicon.png" alt="X">
          </a>
        </div>
      </div>

    </div>

    <p class="footer-note">
      Learn, explore, and enjoy the world of coffee.
    </p>

    <p class="copyright">
      © 2026 Bean to Brew. All rights reserved.
    </p>

  </footer>

</body>
</html>
