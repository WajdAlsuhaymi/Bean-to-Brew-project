<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result | Bean to Brew</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Playfair Display', serif;
background: linear-gradient(to bottom,#3A2F2B,#4B4F3E);
color:#2f241d;
}

.result-page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:120px 20px;
}

.result-card{
width:min(750px,92%);
background:white;
border-radius:30px;
padding:45px 35px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,0.15);
}

.result-badge{
display:inline-block;
padding:8px 18px;
border-radius:999px;
background:#C1B393;
color:#2f241d;
margin-bottom:18px;
font-weight:600;
}

.result-card h1{
font-size:2.6rem;
color:#3b2a20;
margin-bottom:10px;
}

.result-card p{
color:#6a5444;
margin-bottom:20px;
}

.score-box{
background:#f7f2eb;
border:1px solid #e0d5c8;
border-radius:24px;
padding:30px 20px;
margin:30px 0;
}

.score-box h2{
font-size:1.2rem;
color:#6a5444;
margin-bottom:10px;
}

.score{
font-size:3rem;
font-weight:700;
color:#2f241d;
margin-bottom:8px;
}

.best-score{
font-size:0.95rem;
color:#8b7565;
}

.message{
background:#eef7ef;
color:#2f5a35;
border-radius:16px;
padding:14px;
margin-bottom:25px;
}

.result-actions{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.result-actions a{
text-decoration:none;
padding:12px 28px;
border-radius:999px;
font-size:1rem;
transition:0.3s;
}

.btn-retry{
background:#C1B393;
color:#2f241d;
}

.btn-retry:hover{
background:#b3a17d;
}

.btn-home{
background:#EDE8DC;
color:#2f241d;
border:1px solid #d8cbbb;
}

.btn-home:hover{
background:#ddd2c4;
}

</style>
</head>

<body>

<main class="result-page">

<div class="result-card">

<span class="result-badge">Quiz Result</span>

<h1>Quiz Completed</h1>

<p>Your quiz result will appear below.</p>

<div class="score-box">

<h2>Your Score</h2>

<div class="score">
-- / 5
</div>

<p class="best-score">
Best Score: -- / 5
</p>

</div>

<div class="message">
Great effort! Review the lesson and try again to improve your score.
</div>

<div class="result-actions">

<a href="lesson2-quiz.html" class="btn-retry">
Try Again
</a>

<a href="BrewSchool.html" class="btn-home">
Back to Brew School
</a>

</div>

</div>

</main>

</body>
</html>
